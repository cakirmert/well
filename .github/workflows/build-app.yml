name: Build app

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux GUI runtime packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and packaging tools
        run: python -m pip install -e ".[packaging]"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build executable
        run: python tools/build_executable.py

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          if ($env:RUNNER_OS -eq "Windows") {
            Compress-Archive -Path dist\* -DestinationPath release\WellpassCalendarSync-Windows.zip -Force
          } elseif ($env:RUNNER_OS -eq "macOS") {
            Compress-Archive -Path dist/* -DestinationPath release/WellpassCalendarSync-macOS.zip -Force
          } else {
            tar -czf release/WellpassCalendarSync-Linux.tar.gz -C dist .
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WellpassCalendarSync-${{ runner.os }}
          path: release/*

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: WellpassCalendarSync-*
          path: release-assets
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          generate_release_notes: true
